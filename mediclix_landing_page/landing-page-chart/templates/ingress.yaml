apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
  name: {{ .Values.releaseName }}-{{ .Values.environment }}
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - pathType: Prefix
            path: /{{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
    - host: www.{{ .Values.ingress.host }}
      http:
        paths:
          - pathType: Prefix
            path: /{{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
    - host: {{ .Values.ingress.additionalHost }}
      http:
        paths:
          - pathType: Prefix
            path: /{{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
    - host: www.{{ .Values.ingress.additionalHost }}
      http:
        paths:
          - pathType: Prefix
            path: /{{ .Values.ingress.path }}
            backend:
              service:
                name: {{ .Values.service.name }}
                port:
                  number: {{ .Values.service.port }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
        - www.{{ .Values.ingress.host }}
        - {{ .Values.ingress.additionalHost }}
        - www.{{ .Values.ingress.additionalHost }}
      secretName: {{ .Values.ingress.secretName }}
